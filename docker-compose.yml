version: '3.8'

services:
  reply-bot:
    build: .
    container_name: reply-bot
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - EXCHANGER_NAME=${EXCHANGER_NAME}
      - USERNAME=${USERNAME}
      - PASSWORD=${PASSWORD}
      - ADMIN_URL=${ADMIN_URL}
      - REVIEWS_URL=${REVIEWS_URL}
      - HEADLESS=${HEADLESS}
    volumes:
      - ./config.py:/app/config.py
      - ./logs:/app/logs
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
